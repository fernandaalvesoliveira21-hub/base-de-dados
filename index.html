<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conexão Campo & Cidade</title>
    <style>
        /* Variáveis de Cores - Facilita a customização */
        :root {
            --cor-azul-cidade: #1d4ed8;
            --cor-verde-campo: #15803d;
            --cor-fundo: #f8fafc;
            --cor-texto-escuro: #1e293b;
            --cor-texto-claro: #64748b;
            --card-fundo: #ffffff;
        }

        /* Reset Geral */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--cor-fundo);
            color: var(--cor-texto-escuro);
            line-height: 1.6;
        }

        /* Cabeçalho com Degradê Combinando as Cores */
        header {
            background: linear-gradient(135deg, var(--cor-azul-cidade) 0%, var(--cor-verde-campo) 100%);
            color: white;
            padding: 3.5rem 1rem;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.75rem;
            letter-spacing: -0.05em;
        }

        header p {
            font-size: 1.15rem;
            max-width: 600px;
            margin: 0 auto;
            opacity: 0.9;
            font-weight: 300;
        }

        /* Container Principal */
        main {
            max-width: 1100px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }

        /* Seção de Introdução */
        .introducao {
            text-align: center;
            margin-bottom: 3.5rem;
        }

        .introducao h2 {
            font-size: 1.8rem;
            color: var(--cor-texto-escuro);
            margin-bottom: 1rem;
        }

        .introducao p {
            font-size: 1.1rem;
            color: var(--cor-texto-claro);
            max-width: 750px;
            margin: 0 auto;
        }

        /* Grid de Cards Responsivo */
        .grade-conexao {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }
